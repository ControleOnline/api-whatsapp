name: Pull Request Checks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: pull-request-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Check JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check diff hygiene
        run: git diff --check
